---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  labels:
    prometheus: kube-prometheus-stack
  name: grafana-operator
spec:
  endpoints:
  - interval: 1m
    path: /metrics
    port: metrics
    scrapeTimeout: 10s
  jobLabel: grafana-operator
  namespaceSelector:
    matchNames:
    - grafana
  selector:
    matchLabels:
      app.kubernetes.io/instance: grafana-operator
      app.kubernetes.io/name: grafana-operator
