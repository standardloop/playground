---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: prometheus
spec:
  hosts:
  - "prometheus.playground.local"
  gateways:
  - playground-local-gateway
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: kube-prometheus-stack-prometheus.kube-prometheus-stack.svc.cluster.local
        port:
          number: 9090
