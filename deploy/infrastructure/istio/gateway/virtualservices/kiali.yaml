---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: kiali
spec:
  hosts:
  - "kiali.playground.local"
  gateways:
  - playground-local-gateway
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: kiali.istio-system.svc.cluster.local
        port:
          number: 20001
