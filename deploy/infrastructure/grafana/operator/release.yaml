---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-operator
spec:
  timeout: 5m
  interval: 15m
  chart:
    spec:
      chart: grafana-operator
      # version: latest
      sourceRef:
        kind: HelmRepository
        name: grafana-operator
        namespace: flux-system
      interval: 5m
  releaseName: grafana-operator
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  test:
    enable: false
  driftDetection:
    mode: disabled
  values:
    serviceMonitor:
      enabled: false
      additionalLabels:
        prometheus: kube-prometheus
