---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homer
data:
  config.yml: |
    ---
    # Optional: Use external configuration file.
    # Using this will ignore remaining config in this file
    # externalConfig: https://example.com/server-luci/config.yaml

    title: "Playground Dashboard"
    subtitle: "Homer"
    documentTitle: "Playground Dashboard" # Customize the browser tab text
    logo: "logo.png"
    # icon: "fas fa-skull-crossbones"

    header: true # Set to false to hide the header
    # Optional: Different hotkey for search, defaults to "/"
    # hotkey:
    #   search: "Shift"
    footer: false

    columns: "3" # "auto" or number (must be a factor of 12: 1, 2, 3, 4, 6, 12)
    connectivityCheck: true # whether you want to display a message when the apps are not accessible anymore (VPN disconnected for example).
                            # You should set it to true when using an authentication proxy, it also reloads the page when a redirection is detected when checking connectivity.

    # Optional: Proxy / hosting option
    proxy:
      useCredentials: false # send cookies & authorization headers when fetching service specific data. Set to `true` if you use an authentication proxy. Can be overrided on service level.
      # headers: # send custom headers when fetching service specific data. Can also be set on a service level.
      #   Test: "Example"
      #   Test1: "Example1"


    # Set the default layout and color scheme
    defaults:
      layout: columns # Either 'columns', or 'list'
      colorTheme: auto # One of 'auto', 'light', or 'dark'

    # Optional theming
    theme: walkxcode # default, neon, walkxcode

    # Optional custom stylesheet
    # Will load custom CSS files. Especially useful for custom icon sets.
    # stylesheet:
    #   - "assets/custom.css"

    # Here is the exhaustive list of customization parameters
    # However all value are optional and will fallback to default if not set.
    # if you want to change only some of the colors, feel free to remove all unused key.
    colors:
      light:
        highlight-primary: "#3367d6"
        highlight-secondary: "#4285f4"
        highlight-hover: "#5a95f5"
        background: "#f5f5f5"
        card-background: "#ffffff"
        text: "#363636"
        text-header: "#424242"
        text-title: "#303030"
        text-subtitle: "#424242"
        card-shadow: rgba(0, 0, 0, 0.1)
        link: "#3273dc"
        link-hover: "#363636"
        #background-image: "/assets/your/light/bg.png" # prefix with your sub subpath if any (ex: /homer/assets/...)
      dark:
        highlight-primary: "#3367d6"
        highlight-secondary: "#4285f4"
        highlight-hover: "#5a95f5"
        background: "#131313"
        card-background: "#2b2b2b"
        text: "#eaeaea"
        text-header: "#ffffff"
        text-title: "#fafafa"
        text-subtitle: "#f5f5f5"
        card-shadow: rgba(0, 0, 0, 0.4)
        link: "#3273dc"
        link-hover: "#ffdd57"
        #background-image: "/assets/your/dark/bg.png" # prefix with your sub subpath if any (ex: /homer/assets/...)

    # Optional message
    message:
      # url: "https://<my-api-endpoint>" # Can fetch information from an endpoint to override value below.
      # mapping: # allows to map fields from the remote format to the one expected by Homer
      #   title: 'id' # use value from field 'id' as title
      #   content: 'value' # value from field 'value' as content
      # refreshInterval: 10000 # Optional: time interval to refresh message
      #
      # Real example using chucknorris.io for showing Chuck Norris facts as messages:
      # url: https://api.chucknorris.io/jokes/random
      # mapping:
      #   title: 'id'
      #   content: 'value'
      # refreshInterval: 10000
      style: "is-info"
      title: "Reminder!"
      icon: "fa-solid fa-circle-info"
      content: "<p>Make sure your <code>/etc/hosts</code> is configured!</p>"

    links:
      - name: "GitHub"
        icon: "fab fa-github"
        url: "https://github.com/standardloop/playground"
        target: "_blank" # optional html tag target attribute
      - name: "Personal Website"
        icon: "fas fa-external-link-alt"
        url: "https://standardloop.dev"
        target: "_blank" # optional html tag target attribute

    services:
      - name: "K8s Infrastructure"
        # logo: "https://kubernetes.io/images/wheel.svg" # doesn't scale as well
        icon: "fas fa-dharmachakra"
        # A path to an image can also be provided. Note that icon take precedence if both icon and logo are set.
        # logo: "path/to/logo"
        class: "blue" # Optional css class to add on the service group.
        items:
          - name: "Argo Rollouts"
            subtitle: "progressive delivery"
            logo: "https://argo-rollouts.readthedocs.io/en/stable/assets/logo.png"
            tag: "infra"
            keywords: "Argo Rollouts"
            url: "http://rollouts.playground.local"
            type: "Ping"
            target: "_blank" # optional html tag target attribute
          - name: "Prometheus"
            subtitle: "metrics"
            logo: "https://prometheus.io/_next/static/media/prometheus-logo.7aa022e5.svg"
            tag: "infra"
            keywords: "Prometheus"
            url: "http://prometheus.playground.local"
            endpoint: "http://prometheus.playground.local/-/healthy"
            type: "Ping"
            target: "_blank" # optional html tag target attribute
          - name: "Grafana"
            subtitle: "monitoring"
            logo: "https://grafana.com/media/docs/grafana-cloud/infrastructure/grafanalogo.svg"
            tag: "infra"
            keywords: "Grafana"
            url: "http://grafana.playground.local/dashboards"
            endpoint: "http://grafana.playground.local/api/health"
            type: "Ping"
            target: "_blank" # optional html tag target attribute
          - name: "Headlamp"
            icon: "fa-solid fa-train"
            # logo: "https://headlamp.dev/img/logo.svg" # doesn't scale well
            subtitle: "k8s web UI"
            tag: "infra"
            keywords: "Headlamp"
            url: "http://headlamp.playground.local"
            type: "Ping"
            target: "_blank" # optional html tag target attribute
          - name: "Kiali"
            icon: "fa-regular fa-circle"
            # logo: "https://kiali.io/favicons/favicon-32x32.png"
            subtitle: "The Console for Istio Service Mesh"
            tag: "infra"
            keywords: "Kiali"
            url: "http://kiali.playground.local"
            type: "Ping"
            target: "_blank" # optional html tag target attribute
      - name: "Applications"
        icon: "fas fa-rocket"
        # A path to an image can also be provided. Note that icon take precedence if both icon and logo are set.
        # logo: "path/to/logo"
        class: "highlight-purple" # Optional css class to add on the service group.
        items:
          - name: "Homer"
            logo: "logo.png"
            subtitle: "This page!"
            tag: "app"
            keywords: "Homer"
            url: "http://home.playground.local"
            # endpoint: "http://localhost:8080"
            type: "Ping"
            target: "_blank" # optional html tag target attribute
