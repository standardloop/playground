---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
spec:
  timeout: 5m
  interval: 15m
  chart:
    spec:
      chart: headlamp
      version: 0.40.0  # 0.40.1 has an issue
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
      interval: 5m
  releaseName: headlamp
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  test:
    enable: false
  driftDetection:
    mode: disabled
